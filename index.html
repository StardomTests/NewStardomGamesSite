<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stardom Game Studios</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/jordan-trempert/media/refs/heads/main/stardom-logo%20(1).png">
<link href="https://fonts.googleapis.com/css2?family=Jersey+15&display=swap" rel="stylesheet">
<style>
:root {
  --base: #03050f;
  --text: #e8eeff;
  --primary: #3b82f6;
  --primary-bright: #60a5fa;
  --primary-glow: rgba(59,130,246,0.18);
  --secondary: #818cf8;
  --line: #0f1a2e;
  --line-bright: #1e3a5f;
}

* { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }

body {
  font-family: 'Jersey 15', sans-serif;
  background-color: var(--base);
  color: var(--text);
  overflow-x: hidden;
  text-transform: uppercase;
  background-image: radial-gradient(rgba(59,130,246,0.10) 1px, transparent 1px);
  background-size: 28px 28px;
  animation: bodyFadeIn 0.6s ease forwards;
}
@keyframes bodyFadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── SCAN LINES ── */
.noise {
  position: fixed; inset: 0; z-index: 999; pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px
  );
}

/* ── CURSORS ── */
.cursor {
  position: fixed; width: 10px; height: 10px;
  background: var(--primary-bright); border-radius: 50%;
  pointer-events: none; z-index: 10000;
  transform: translate(-50%,-50%);
  mix-blend-mode: screen; will-change: left,top;
  box-shadow: 0 0 10px var(--primary), 0 0 24px rgba(59,130,246,0.5);
  transition: width .15s, height .15s, background .15s;
}
.cursor-ring {
  position: fixed; width: 34px; height: 34px;
  border: 1px solid rgba(96,165,250,0.35); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%); will-change: left,top;
  transition: width .3s cubic-bezier(.16,1,.3,1), height .3s cubic-bezier(.16,1,.3,1), border-color .2s;
}
.cursor.hover   { width: 5px; height: 5px; background: #fff; }
.cursor-ring.hover { width: 56px; height: 56px; border-color: var(--primary); }
@media (hover: none), (pointer: coarse) {
  .cursor, .cursor-ring { display: none !important; }
  * { cursor: auto; }
}

/* ── SCROLLING BACKGROUND ── */
.bg-scroller {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1; pointer-events: none; overflow: hidden;
  display: flex; flex-direction: column; justify-content: space-around;
  gap: 0;
}
.bg-row {
  display: flex; white-space: nowrap;
  animation: bgScroll 28s linear infinite;
}
.bg-row:nth-child(2)  { animation-duration: 36s; animation-direction: reverse; }
.bg-row:nth-child(3)  { animation-duration: 22s; animation-delay: -5s; }
.bg-row:nth-child(4)  { animation-duration: 40s; animation-direction: reverse; animation-delay: -10s; }
.bg-row:nth-child(5)  { animation-duration: 25s; animation-delay: -8s; }
.bg-row:nth-child(6)  { animation-duration: 33s; animation-direction: reverse; animation-delay: -3s; }
.bg-row span {
  font-family: 'Jersey 15', sans-serif; font-size: 9vw; font-weight: 800;
  color: transparent;
  -webkit-text-stroke: 1px rgba(59,130,246,0.025);
  padding: 0 2vw; user-select: none; letter-spacing: -2px;
}
@keyframes bgScroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ── PROGRESS BAR ── */
.progress-bar {
  position: fixed; top: 0; left: 0; height: 3px; z-index: 10001; width: 0%;
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
  background-size: 200% 100%;
  box-shadow: 0 0 12px var(--primary), 0 0 24px rgba(59,130,246,0.4);
  animation: shimmerBar 2s linear infinite;
  transition: width .08s linear;
}
@keyframes shimmerBar { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }

/* ── LAYOUT ── */
.layout { display: grid; grid-template-columns: 100px 1fr; min-height: 100vh; }

/* ── SIDEBAR ── */
aside {
  border-right: 1px solid var(--line-bright);
  display: flex; flex-direction: column; justify-content: space-between;
  align-items: center; padding: 2rem 0;
  position: sticky; top: 0; height: 100vh;
  background: rgba(3,5,15,0.88); backdrop-filter: blur(16px); z-index: 50;
  overflow: hidden;
}
.brand-box {
  width: 58px; height: 58px; background: var(--primary);
  display: flex; justify-content: center; align-items: center;
  transition: transform .4s cubic-bezier(.16,1,.3,1), box-shadow .3s; flex-shrink: 0;
  box-shadow: 0 0 18px rgba(59,130,246,0.35);
  animation: brandPulse 3s ease-in-out infinite;
  overflow: visible;
}
@keyframes brandPulse {
  0%, 100% { box-shadow: 0 0 18px rgba(59,130,246,0.35); }
  50% { box-shadow: 0 0 28px rgba(59,130,246,0.6), 0 0 50px rgba(59,130,246,0.2); }
}
.brand-box:hover { transform: rotate(90deg); box-shadow: 0 0 32px rgba(59,130,246,0.65); }
.brand-box img { width: 32px; height: 32px; filter: brightness(0) invert(1); display: block; overflow: visible; }

.nav-menu { display: flex; flex-direction: column; gap: 2rem; }
.nav-btn {
  writing-mode: vertical-rl; transform: rotate(180deg);
  font-size: 1rem; font-weight: 700; color: #1e3a5f;
  text-decoration: none; letter-spacing: 3px;
  transition: color .2s, text-shadow .2s; padding: 10px 0; position: relative;
}
.nav-btn::before {
  content: ''; position: absolute; left: -1px; top: 0;
  width: 2px; height: 0;
  background: linear-gradient(to bottom, var(--primary-bright), var(--secondary));
  transition: height .3s cubic-bezier(.16,1,.3,1);
}
.nav-btn:hover::before, .nav-btn.active::before { height: 100%; }
.nav-btn:hover, .nav-btn.active {
  color: var(--primary-bright);
  text-shadow: 0 0 14px rgba(96,165,250,0.6);
}
.sys-clock {
  writing-mode: vertical-rl; transform: rotate(180deg);
  font-family: 'Jersey 15', monospace;
  font-size: 1rem; color: #1e3a5f; letter-spacing: 2px;
}

/* ── MAIN ── */
main { padding: 4rem 6rem; min-height: 100vh; width: 100%; overflow-x: hidden; }

/* ── PANELS ── */
.panel { display: none; opacity: 0; transform: translateY(20px); }
.panel.active { display: block; animation: snapIn .45s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes snapIn { to { opacity: 1; transform: translateY(0); } }

/* ── HERO ── */
.hero { display: flex; flex-direction: column; justify-content: center; min-height: 80vh; }
.hero-sub {
  font-size: 1rem; letter-spacing: 6px; color: var(--primary);
  margin-bottom: 1.5rem; opacity: 0.7;
}
.hero h1 {
  font-family: 'Jersey 15', sans-serif;
  font-size: clamp(3.5rem, 11vw, 9.5rem); font-weight: 800;
  line-height: 1.05; margin-bottom: 3rem; letter-spacing: -3px;
  overflow: visible;
}
.hero h1 .line1, .hero h1 .line2 { display: block; color: var(--text); }
.hero h1 .line3 {
  display: block;
  background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  padding-bottom: 0.25em;
  overflow: visible;
}
.hero h1 .line3 .glitch-wrap {
  filter: drop-shadow(0 0 22px rgba(59,130,246,0.45));
}

/* ── GLITCH ── */
.glitch-wrap { position: relative; display: inline-block; }
.glitch-wrap::before, .glitch-wrap::after {
  content: attr(data-text); position: absolute; inset: 0;
  font-family: inherit; font-size: inherit; font-weight: inherit;
  letter-spacing: inherit; line-height: inherit; pointer-events: none;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.glitch-wrap::before { animation: glitch1 5s infinite steps(1); opacity: 0.5; }
.glitch-wrap::after  { animation: glitch2 5s infinite steps(1) .07s; opacity: 0.35; }
@keyframes glitch1 {
  0%,85%,100% { clip-path: inset(100% 0 0 0); transform: translate(0,0); }
  86%  { clip-path: inset(10% 0 80% 0); transform: translate(-3px,0); }
  89%  { clip-path: inset(55% 0 30% 0); transform: translate(3px,0); }
  92%  { clip-path: inset(75% 0 5% 0);  transform: translate(-2px,0); }
  95%  { clip-path: inset(30% 0 60% 0); transform: translate(2px,0); }
}
@keyframes glitch2 {
  0%,85%,100% { clip-path: inset(100% 0 0 0); transform: translate(0,0); }
  87%  { clip-path: inset(40% 0 50% 0); transform: translate(3px,0); }
  90%  { clip-path: inset(5% 0 90% 0);  transform: translate(-3px,0); }
  93%  { clip-path: inset(65% 0 15% 0); transform: translate(2px,0); }
  96%  { clip-path: inset(20% 0 70% 0); transform: translate(-1px,0); }
}

/* ── COUNTERS ── */
.data-row {
  display: flex; gap: 4rem;
  border-top: 1px solid var(--line-bright);
  padding-top: 2rem; margin-bottom: 4rem;
}
.data-node { display: flex; flex-direction: column; }
.d-val {
  font-family: 'Jersey 15', sans-serif; font-size: 4rem; font-weight: 800; line-height: 1;
  background: linear-gradient(135deg, var(--text) 30%, var(--primary-bright));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.d-lbl { font-size: 1rem; font-weight: 700; color: var(--primary); letter-spacing: 3px; margin-top: 0.5rem; }

/* ── TICKER ── */
.ticker-wrap {
  border-top: 1px solid var(--line-bright); border-bottom: 1px solid var(--line-bright);
  overflow: hidden; padding: 0.7rem 0; position: relative; margin-bottom: 4rem;
}
.ticker-wrap::before, .ticker-wrap::after {
  content: ''; position: absolute; top: 0; width: 100px; height: 100%; z-index: 2;
}
.ticker-wrap::before { left: 0; background: linear-gradient(to right, var(--base), transparent); }
.ticker-wrap::after  { right: 0; background: linear-gradient(to left, var(--base), transparent); }
.ticker-track { display: flex; width: max-content; animation: tickerAnim 28s linear infinite; }
.ticker-track:hover { animation-play-state: paused; }
@keyframes tickerAnim { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.ticker-item { font-size: 1rem; font-weight: 700; letter-spacing: 3px; color: #2a5080; padding: 0 2rem; white-space: nowrap; transition: color .2s; }
.ticker-item:hover { color: var(--primary-bright); }
.ticker-item span { color: var(--primary); margin-right: 0.6rem; }

/* ── FEATURED ── */
.feat-label {
  font-size: 1rem; font-weight: 700; letter-spacing: 5px; color: var(--primary);
  margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem;
}
.feat-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--line-bright), transparent); }
.feat-card {
  display: flex; align-items: center; gap: 2.5rem;
  border: 1px solid var(--line-bright); padding: 2rem;
  position: relative; overflow: hidden;
  transition: border-color .3s, box-shadow .3s; text-decoration: none;
  background: linear-gradient(135deg, rgba(59,130,246,0.05) 0%, transparent 60%);
}
.feat-card::before {
  content: 'FEATURED'; position: absolute; top: 1rem; right: 1rem;
  font-size: 1rem; letter-spacing: 3px; font-weight: 700;
  color: var(--base); background: var(--primary); padding: 0.2rem 0.6rem;
  z-index: 2;
}
.feat-card:hover { border-color: var(--primary); box-shadow: 0 0 50px rgba(59,130,246,0.2), 0 0 80px rgba(59,130,246,0.08); }
.feat-img {
  width: 130px; height: 130px; object-fit: cover; flex-shrink: 0;
  filter: grayscale(50%); transition: filter .4s, transform .4s;
  border: 1px solid var(--line-bright);
}
.feat-card:hover .feat-img { filter: grayscale(0%); transform: scale(1.04); }
.feat-meta { flex: 1; }
.feat-name { font-family: 'Jersey 15', sans-serif; font-size: 2.8rem; font-weight: 800; color: var(--text); margin-bottom: 0.5rem; line-height: 1; }
.feat-desc { font-size: 1rem; color: #4a7aaa; text-transform: none; margin-bottom: 1.25rem; line-height: 1.6; }
.feat-cta {
  display: inline-block; font-size: 1rem; font-weight: 700; letter-spacing: 3px;
  color: var(--base); background: linear-gradient(90deg, var(--primary), var(--secondary));
  padding: 0.6rem 1.5rem; transition: opacity .2s, transform .2s;
}
.feat-cta:hover { opacity: 0.85; transform: translateX(4px); }

/* ── SECTION HEADER ── */
.section-head {
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--line-bright);
  padding-bottom: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
}
.section-head h2 {
  font-family: 'Jersey 15', sans-serif; font-size: 3.5rem; line-height: 1; letter-spacing: -1px;
  background: linear-gradient(135deg, var(--text), var(--primary-bright));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.count {
  font-family: 'Jersey 15', monospace; font-size: 1rem; font-weight: 700;
  color: var(--base); background: linear-gradient(90deg, var(--primary), var(--secondary));
  padding: 0.5rem 1.25rem; border-radius: 99px; letter-spacing: 2px;
}

/* ── SEARCH ── */
.search-wrap { margin-bottom: 2rem; position: relative; }
.search-icon { position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: #1e3a5f; pointer-events: none; }
.search-input {
  width: 100%; background: rgba(59,130,246,0.03);
  border: 1px solid var(--line-bright); border-left: 3px solid var(--primary);
  color: var(--text); font-family: 'Jersey 15', sans-serif;
  font-size: 1rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
  padding: 0.85rem 1.25rem 0.85rem 3rem;
  outline: none; transition: border-color .2s, background .2s, box-shadow .2s;
}
.search-input::placeholder { color: #1e3a5f; }
.search-input:focus { background: rgba(59,130,246,0.06); border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.08); }
.no-results { text-align: center; padding: 4rem; color: #1e3a5f; font-size: 1rem; letter-spacing: 3px; display: none; }

/* ── BENTO ── */
.bento { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 1.5rem; }

/* ── CARDS ── */
.card {
  display: block; text-decoration: none;
  background: rgba(3,5,15,0.5); border: 1px solid var(--line-bright);
  padding: 1.5rem; transition: all .3s cubic-bezier(.16,1,.3,1);
  position: relative; animation: fadeCard .4s ease both;
}
@keyframes fadeCard { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.card::after {
  content: ''; position: absolute; top: 5px; left: 5px;
  width: 100%; height: 100%; border: 1px solid var(--primary);
  z-index: -1; transition: all .3s cubic-bezier(.16,1,.3,1); opacity: 0;
}
.card:hover { transform: translate(-4px,-4px); border-color: var(--primary-bright); background: rgba(59,130,246,0.07); box-shadow: 0 8px 30px rgba(59,130,246,0.18), inset 0 0 20px rgba(59,130,246,0.04); }
.card:hover::after { opacity: 1; transform: translate(5px,5px); }
.badge {
  position: absolute; top: 0.75rem; right: 0.75rem;
  font-size: 1rem; font-weight: 700; letter-spacing: 2px; padding: 0.25rem 0.6rem; z-index: 2;
}
.badge-new   { background: var(--primary); color: #fff; }
.badge-hot   { background: #ef4444; color: #fff; box-shadow: 0 0 8px rgba(239,68,68,0.5); }
.badge-steam { background: #1b2838; color: #a8d8f8; border: 1px solid #66c0f4; }
.badge-xbox  { background: #107c10; color: #fff; border: 1px solid #5dc45d; }
.badge-vr    { background: var(--secondary); color: #fff; }
.c-media {
  width: 100%; height: 165px; background: var(--line);
  margin-bottom: 1.25rem; overflow: hidden; border: 1px solid var(--line-bright); position: relative;
}
.c-media::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(3,5,15,0.35), transparent); pointer-events: none;
}
.c-media img {
  width: 100%; height: 100%; object-fit: cover;
  filter: grayscale(100%) contrast(110%) brightness(0.75);
  transition: filter .4s, transform .4s;
}
.card:hover .c-media img { filter: grayscale(0%) contrast(100%) brightness(1); transform: scale(1.06); }
.c-title {
  font-family: 'Jersey 15', sans-serif; font-size: 1.25rem; font-weight: 800;
  color: var(--text); margin-bottom: 0.4rem; transition: color .2s;
}
.card:hover .c-title { color: var(--primary-bright); }
.c-desc { font-size: 1rem; color: #2a5080; line-height: 1.5; text-transform: none; font-weight: 500; }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0; background: rgba(3,5,15,0.93);
  backdrop-filter: blur(16px); z-index: 2000; display: none;
  place-items: center; padding: 2rem;
}
.overlay.open { display: grid; animation: fadeIn .2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--base); border: 1px solid var(--primary);
  width: 100%; max-width: 900px; padding: 4rem; position: relative;
  box-shadow: 0 0 80px rgba(59,130,246,0.25), 14px 14px 0 rgba(59,130,246,0.07), inset 0 0 60px rgba(59,130,246,0.03);
  animation: slideUp .35s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.close-x {
  position: absolute; top: 1.5rem; right: 2rem;
  font-family: 'Jersey 15', sans-serif; font-size: 3rem; font-weight: 800;
  color: var(--text); transition: color .2s;
}
.close-x:hover { color: var(--primary); }
.m-head { font-family: 'Jersey 15', sans-serif; font-size: 3rem; margin-bottom: 2rem; line-height: 1; }
.m-content { text-transform: none; font-size: 1.1rem; color: #7aa0c0; line-height: 1.8; }
.m-content h4 { color: var(--primary-bright); font-family: 'Jersey 15', sans-serif; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 1rem; }

/* ── SCROLL-TO-TOP ── */
.scroll-top {
  position: fixed; bottom: 2rem; right: 2rem;
  width: 44px; height: 44px; border: 1px solid var(--line-bright);
  background: rgba(3,5,15,0.85); display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; color: var(--primary); z-index: 200;
  opacity: 0; pointer-events: none;
  transition: opacity .3s, border-color .2s, box-shadow .2s, transform .2s; backdrop-filter: blur(8px);
}
.scroll-top.visible { opacity: 1; pointer-events: auto; }
.scroll-top:hover { border-color: var(--primary); box-shadow: 0 0 20px rgba(59,130,246,0.4); transform: translateY(-3px); }

/* ── KB HINT ── */
.kb-hint {
  position: fixed; bottom: 1.5rem; left: 120px;
  font-size: 1rem; letter-spacing: 2px; color: #1e3a5f; z-index: 100; pointer-events: none;
}
.kb-hint kbd {
  background: #0a1525; border: 1px solid #1e3a5f; border-radius: 3px;
  padding: .1rem .3rem; font-family: 'Jersey 15', monospace; font-size: 1rem; color: #2a4a6e;
}

/* ── HAMBURGER ── */
.ham-btn { display: none; flex-direction: column; gap: 5px; background: none; border: none; padding: 8px; }
.ham-btn span { display: block; width: 22px; height: 2px; background: var(--text); transition: all .3s; }
.ham-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.ham-btn.open span:nth-child(2) { opacity: 0; }
.ham-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .layout { grid-template-columns: 1fr; }
  aside {
    width: 100%; height: 65px; flex-direction: row; padding: 0 1.5rem;
    border-right: none; border-bottom: 1px solid var(--line-bright);
    position: sticky; top: 0; z-index: 300;
    backdrop-filter: none;
  }
  .nav-menu {
    flex-direction: column; position: fixed; top: 65px; left: 0; right: 0;
    background: rgba(3,5,15,0.98);
    padding: 2rem; gap: 1.5rem; border-bottom: 1px solid var(--line-bright);
    transform: translateY(-200%); transition: transform .35s cubic-bezier(.16,1,.3,1); z-index: 400;
  }
  .nav-menu.open { transform: translateY(0); }
  .nav-btn { writing-mode: horizontal-tb; transform: none; font-size: 1.1rem; letter-spacing: 4px; }
  .nav-btn::before { left: 0; top: auto; bottom: -2px; width: 0; height: 2px; }
  .nav-btn:hover::before, .nav-btn.active::before { width: 100%; height: 2px; }
  .ham-btn { display: flex; }
  .sys-clock, .kb-hint { display: none; }
  main { padding: 2rem 1.5rem; }
  .data-row { flex-direction: column; gap: 2rem; }
  .feat-card { flex-direction: column; align-items: flex-start; }
  .feat-img { width: 100%; height: 200px; margin-top: 2.5rem; }
  .bg-row span { font-size: 16vw; }
  .scroll-top { bottom: 1.5rem; right: 1.5rem; }
  /* Fix hero h1 clipping on mobile */
  .hero h1 { overflow: visible; padding-bottom: 0.2em; }
  .hero h1 .line3 { padding-bottom: 0.2em; }
  /* Remove glitch pseudo-elements on mobile — they clip the gradient text */
  .glitch-wrap::before, .glitch-wrap::after { display: none; }
  /* Remove black gradient overlay on card images on mobile to prevent bar artifact */
  .c-media::after { display: none; }
}
@media (max-width: 600px) {
  .bento { grid-template-columns: 1fr 1fr; gap: 0.75rem; }

/* ─── SCROLLING BACKGROUND ─── */
(function buildBg() {
  const words = ['STARDOM','//','GAME','STUDIOS','//','STARDOM','GAME','//'];
  const scroller = document.getElementById('bgScroller');
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'bg-row';
    // duplicate so seamless loop works
    const set = [...words, ...words];
    row.innerHTML = set.map(w => `<span>${w}</span>`).join('');
    scroller.appendChild(row);
  }
})();

/* ─── DUAL CURSOR (lerp) ─── */
const ptr = document.getElementById('ptr'), ring = document.getElementById('ring');
let mx=-200, my=-200, cx=-200, cy=-200, rx=-200, ry=-200;
let usingTouch = false;
window.addEventListener('touchstart', () => {
  usingTouch = true;
  ptr.style.display='none'; ring.style.display='none';
}, { once: true });
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function loop() {
  if (!usingTouch) {
    cx += (mx-cx)*0.2; cy += (my-cy)*0.2;
    rx += (mx-rx)*0.09; ry += (my-ry)*0.09;
    ptr.style.left  = cx+'px'; ptr.style.top  = cy+'px';
    ring.style.left = rx+'px'; ring.style.top = ry+'px';
  }
  requestAnimationFrame(loop);
})();

/* ─── PROGRESS BAR + SCROLL TOP ─── */
const pbar = document.getElementById('pbar');
const stBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  const d = document.documentElement;
  pbar.style.width = (d.scrollTop / (d.scrollHeight - d.clientHeight) * 100) + '%';
  stBtn.classList.toggle('visible', d.scrollTop > 200);
});

/* ─── CLOCK ─── */
function tick() { document.getElementById('clk').textContent = new Date().toLocaleTimeString('en-US',{hour12:false}); }
setInterval(tick, 1000); tick();

/* ─── COUNTER ─── */
function animateCounter(el, target, dur=1200) {
  const t0 = performance.now();
  (function u(now) {
    const p = Math.min((now-t0)/dur, 1), e = 1-Math.pow(1-p,4);
    el.textContent = Math.round(e*target);
    if (p<1) requestAnimationFrame(u);
  })(t0);
}

/* ─── TICKER ─── */
const TICKER_ITEMS = [
  '21 GAMES RELEASED','9 MINECRAFT MODS','4 APPLICATIONS',
  'JOKERJACK 1.5.0 NOW LIVE','PERSPECTIVE REMASTERED — ON STEAM',
  'JOIN OUR DISCORD','INDIE SINCE 2019'
];
function buildTicker() {
  const d = [...TICKER_ITEMS,...TICKER_ITEMS];
  return d.map(t=>`<div class="ticker-item"><span>▶</span>${t}</div>`).join('');
}

/* ─── HOME ─── */
function renderHome() {
  document.getElementById('mount').innerHTML = `
    <div class="panel active">
      <div class="hero">
        <div class="hero-sub">// EST. 2019 — INDIE GAME STUDIO</div>
        <h1>
          <span class="line1">STARDOM</span>
          <span class="line2">GAME</span>
          <span class="line3"><span data-text="STUDIOS">STUDIOS</span></span>
        </h1>
        <div class="data-row">
          <div class="data-node"><span class="d-val" id="cg">0</span><span class="d-lbl">GAMES</span></div>
          <div class="data-node"><span class="d-val" id="cm">0</span><span class="d-lbl">MODS</span></div>
          <div class="data-node"><span class="d-val" id="ca">0</span><span class="d-lbl">APPS</span></div>
        </div>
        <div class="ticker-wrap"><div class="ticker-track">${buildTicker()}</div></div>
        <div class="featured-row">
          <div class="feat-label">▶ FEATURED RELEASE</div>
          <a href="https://jokerjack.stardomga.me" target="_blank" rel="noopener noreferrer" class="feat-card int">
            <img class="feat-img" src="https://img.itch.zone/aW1nLzIyODI0NTQ1LnBuZw==/315x250%23c/Sf3Klr.png" alt="JokerJack" onerror="this.style.display='none'">
            <div class="feat-meta">
              <div class="feat-name">JokerJack</div>
              <div class="feat-desc">Balatro meets Blackjack — use wild Joker cards to bend the rules and outlast the dealer in this strategic card game. Version 1.5.0 now live.</div>
              <div class="feat-cta">PLAY NOW →</div>
            </div>
          </a>
        </div>
      </div>
    </div>`;
  animateCounter(document.getElementById('cg'), ds.games.length, 1400);
  animateCounter(document.getElementById('cm'), ds.mods.length,  1000);
  animateCounter(document.getElementById('ca'), ds.apps.length,   700);
  att();
}

/* ─── GRID ─── */
const SEARCHABLE = ['games','mods','apps'];
const LABELS = { games:'GAMES', mods:'MODS', apps:'APPS', socials:'NETWORK', blog:'LOGS' };

function renderGrid(cat) {
  const arr = ds[cat];
  const sh = SEARCHABLE.includes(cat) ? `
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="si" type="text" placeholder="Search ${LABELS[cat]}…" autocomplete="off">
    </div>
    <div class="no-results" id="nr">NO RESULTS FOUND</div>` : '';

  document.getElementById('mount').innerHTML = `
    <div class="panel active">
      <div class="section-head">
        <h2>${LABELS[cat]}</h2>
        <span class="count" id="ec">${arr.length} ENTRIES</span>
      </div>
      ${sh}
      <div class="bento" id="bento"></div>
    </div>`;

  renderCards(arr, cat);

  if (SEARCHABLE.includes(cat)) {
    const si = document.getElementById('si');
    si.addEventListener('input', () => {
      const q = si.value.toLowerCase().trim();
      const f = arr.filter(o => o.name.toLowerCase().includes(q) || o.description.toLowerCase().includes(q));
      renderCards(f, cat);
      document.getElementById('ec').textContent = f.length + ' ENTRIES';
      document.getElementById('nr').style.display = f.length === 0 ? 'block' : 'none';
    });
    si.focus();
  }
}

function badgeHtml(b) {
  if (!b) return '';
  return `<span class="badge badge-${b}">${{new:'NEW',hot:'HOT',steam:'STEAM',vr:'VR',xbox:'XBOX'}[b]}</span>`;
}

function renderCards(arr, cat) {
  const bento = document.getElementById('bento');
  if (!bento) return;
  bento.innerHTML = arr.map((o,i) => `
    <a class="card int" style="animation-delay:${i*.04}s"
       ${cat==='blog'
         ? `href="#" onclick="pop(${ds.blog.indexOf(o)});return false;"`
         : `href="${o.url}" target="_blank" rel="noopener noreferrer"`}>
      ${badgeHtml(o.badge)}
      <div class="c-media">
        <img src="${o.logo}" alt="${o.name}" onerror="this.style.display='none'" loading="lazy">
      </div>
      <div class="c-title">${o.name}</div>
      <div class="c-desc">${o.description}</div>
    </a>`).join('');
  att();
}

/* ─── NAV ─── */
function nav(v, close=true) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view===v));
  if (close) closeMobileMenu();
  v==='home' ? renderHome() : renderGrid(v);
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ─── MODAL ─── */
function pop(i) {
  const p = ds.blog[i];
  document.getElementById('mh').textContent = p.name;
  document.getElementById('mc').innerHTML = p.content;
  document.getElementById('ovr').classList.add('open');
}
function closeModal() { document.getElementById('ovr').classList.remove('open'); }
document.getElementById('cls').addEventListener('click', closeModal);
document.getElementById('ovr').addEventListener('click', e => { if (e.target.id==='ovr') closeModal(); });

/* ─── KEYBOARD ─── */
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  ({'1':'home','2':'games','3':'mods','4':'apps','5':'socials','6':'blog'})[e.key] && nav(({'1':'home','2':'games','3':'mods','4':'apps','5':'socials','6':'blog'})[e.key]);
  e.key==='Escape' && closeModal();
});

/* ─── MOBILE MENU ─── */
const hamBtn = document.getElementById('hamBtn');
const navMenu = document.getElementById('navMenu');
function closeMobileMenu() { navMenu.classList.remove('open'); hamBtn.classList.remove('open'); }
hamBtn.addEventListener('click', () => { navMenu.classList.toggle('open'); hamBtn.classList.toggle('open'); });

/* ─── HOVER ─── */
function onEnter() { ptr.classList.add('hover'); ring.classList.add('hover'); }
function onLeave() { ptr.classList.remove('hover'); ring.classList.remove('hover'); }
function att() {
  document.querySelectorAll('.int').forEach(el => {
    el.removeEventListener('mouseenter', onEnter);
    el.removeEventListener('mouseleave', onLeave);
    el.addEventListener('mouseenter', onEnter);
    el.addEventListener('mouseleave', onLeave);
  });
}

/* ─── NAV WIRING ─── */
document.querySelectorAll('.nav-btn').forEach(btn =>
  btn.addEventListener('click', e => nav(e.currentTarget.dataset.view))
);

/* ─── INIT ─── */
nav('home');
</script>
